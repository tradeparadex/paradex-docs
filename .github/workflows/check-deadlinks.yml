name: "Check Deadlinks"

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-deadlinks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for dead links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --include '^https?://'
            --exclude '^https://api\.prod\.paradex\.trade'
            --exclude '^https://api\.testnet\.paradex\.trade'
            --exclude '^https://eu\.i\.posthog\.com'
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --no-progress
            --accept 200,204
            "fern/pages/**/*.mdx"
            "fern/pages/**/*.md"
            "fern/snippets/**/*.mdx"
          fail: true
