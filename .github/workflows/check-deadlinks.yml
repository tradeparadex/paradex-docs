name: "Check Deadlinks"

on:
  pull_request:
  schedule:
    # Run every Monday at 9:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  check-deadlinks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch sitemap URLs
        id: fetch-urls
        run: |
          curl -s https://docs.paradex.trade/sitemap.xml \
            | grep -oP '<loc>\K[^<]+' \
            > urls.txt
          echo "url_count=$(wc -l < urls.txt)" >> "$GITHUB_OUTPUT"
          echo "Fetched $(wc -l < urls.txt) URLs from sitemap"

      - name: Check for dead links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,204
            --exclude-mail
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            urls.txt
          fail: true
