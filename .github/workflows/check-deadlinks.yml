name: "Check Deadlinks"

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-deadlinks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for dead links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --scheme https
            --scheme http
            --exclude '^https://api\.prod\.paradex\.trade'
            --exclude '^https://api\.testnet\.paradex\.trade'
            --exclude '^https://eu\.i\.posthog\.com'
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --no-progress
            --format json
            "fern/pages/**/*.mdx"
            "fern/pages/**/*.md"
            "fern/snippets/**/*.mdx"
          fail: false
          format: json

      - name: Evaluate results
        run: |
          if [ ! -f lychee/out.md ]; then
            echo "No lychee output found"
            exit 1
          fi
          python3 << 'PYEOF'
          import json, sys

          with open('lychee/out.md') as f:
              data = json.load(f)

          broken = []
          for source, links in data.get('error_map', {}).items():
              for link in links:
                  url = link.get('url', '')
                  status = link.get('status', {})

                  # Only consider external HTTP(S) links
                  if not (url.startswith('http://') or url.startswith('https://')):
                      continue

                  # Skip network/transient errors (e.g. HTTP/2 protocol issues in CI)
                  status_text = status.get('text', '') if isinstance(status, dict) else str(status)
                  if 'Network error' in status_text:
                      print(f'  [SKIP] {url} (transient network error)')
                      continue

                  # Skip sites known to block bots (403 Forbidden)
                  code = status.get('code', 0) if isinstance(status, dict) else 0
                  if code == 403:
                      print(f'  [SKIP] {url} (403 - likely bot protection)')
                      continue

                  broken.append((source, url, status))

          if broken:
              print(f'Found {len(broken)} broken external link(s):')
              for source, url, status in broken:
                  print(f'  {source}: {url} ({status})')
              sys.exit(1)
          else:
              print('All external links are valid.')
          PYEOF
