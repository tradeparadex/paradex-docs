name: "Check Deadlinks"

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-deadlinks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for dead links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --scheme https
            --scheme http
            --exclude '^https://api\.prod\.paradex\.trade'
            --exclude '^https://api\.testnet\.paradex\.trade'
            --exclude '^https://eu\.i\.posthog\.com'
            --accept 429
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --no-progress
            --format json
            "fern/pages/**/*.mdx"
            "fern/pages/**/*.md"
            "fern/snippets/**/*.mdx"
          fail: false
          format: json

      - name: Evaluate results
        run: |
          if [ ! -f lychee/out.md ]; then
            echo "No lychee output found"
            exit 1
          fi
          python3 << 'PYEOF'
          import json, sys

          with open('lychee/out.md') as f:
              data = json.load(f)

          # HTTP codes that confirm a link is genuinely dead
          DEAD_LINK_CODES = {404, 410}

          broken = []
          skipped = []
          for source, links in data.get('error_map', {}).items():
              for link in links:
                  url = link.get('url', '')
                  status = link.get('status', {})

                  # Only consider external HTTP(S) links
                  if not (url.startswith('http://') or url.startswith('https://')):
                      continue

                  status_text = status.get('text', '') if isinstance(status, dict) else str(status)
                  code = status.get('code', 0) if isinstance(status, dict) else 0

                  # Only treat confirmed dead-link status codes as failures.
                  # Everything else (network errors, timeouts, rate limits,
                  # bot-protection 403s, server 5xx, etc.) is transient.
                  if code in DEAD_LINK_CODES:
                      broken.append((source, url, status))
                  else:
                      skipped.append((url, status_text, code))

          for url, text, code in skipped:
              print(f'  [SKIP] {url} (transient: {text}, code={code})')

          if broken:
              print(f'Found {len(broken)} broken link(s):')
              for source, url, status in broken:
                  print(f'  {source}: {url} ({status})')
              sys.exit(1)
          else:
              print(f'All links valid. ({len(skipped)} transient error(s) skipped)')
          PYEOF
