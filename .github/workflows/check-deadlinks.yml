name: "Check Deadlinks"

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-deadlinks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for dead links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,204
            --exclude-mail
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --exclude-path node_modules
            "fern/**/*.mdx"
            "fern/**/*.md"
            "fern/**/*.yml"
            "fern/**/*.yaml"
          fail: true
