  # Redirect root to Home tab landing
  - source: "/"
    destination: "/home"

  # Redirects from old /overview/ prefix to new /docs/ tab
  - source: "/overview/getting-started/:slug*"
    destination: "/docs/getting-started/:slug*"
  - source: "/overview/xp-referrals/:slug*"
    destination: "/docs/xp-referrals/:slug*"
  - source: "/overview/:slug*"
    destination: "/docs/:slug*"
  - source: "/overview"
    destination: "/docs"

  # Legacy root-level redirects
  - source: "/xp-referrals/:slug*"
    destination: "/docs/xp-referrals/:slug*"

  # Redirect old /getting-started/ URLs to new /docs/ tab
  - source: "/getting-started/:slug*"
    destination: "/docs/:slug*"

  # Redirect old /start/ URLs to new /docs/ tab
  - source: "/start/:slug*"
    destination: "/docs/:slug*"

  # Redirect old /docs/trading/ URLs to /trading/ tab
  - source: "/docs/trading/:slug*"
    destination: "/trading/:slug*"

  # Redirect old /docs/risk/ URLs to /risk/ tab
  - source: "/docs/risk/:slug*"
    destination: "/risk/:slug*"

  # Redirect old /docs/security/ URLs to /chain/security/
  - source: "/docs/security/:slug*"
    destination: "/chain/security/:slug*"
  - source: "/security/:slug*"
    destination: "/chain/security/:slug*"

  # Redirect old /docs/paradex-chain/ URLs to /chain/
  - source: "/docs/paradex-chain/:slug*"
    destination: "/chain/:slug*"
  - source: "/paradex-chain/:slug*"
    destination: "/chain/:slug*"

  # Redirect old /docs/ecosystem/ URLs to /ecosystem/
  - source: "/docs/ecosystem/:slug*"
    destination: "/ecosystem/:slug*"

  # Redirect old /docs/release-notes/ URLs to /releases/
  - source: "/docs/release-notes/:slug*"
    destination: "/releases/:slug*"
  - source: "/release-notes/:slug*"
    destination: "/releases/:slug*"

  - source: "/accounts/:slug*"
    destination: "/docs/accounts/:slug*"

  # Legacy /documentation/ prefix redirects
  - source: "/documentation/getting-started/architecture-overview/wallet-integration"
    destination: "/docs/accounts/wallet-integration"
  - source: "/documentation/vaults/:slug*"
    destination: "/docs/vaults/:slug*"
  - source: "/documentation/instruments-guide/:slug*"
    destination: "/trading/instruments-guide/:slug*"
  - source: "/documentation/risk-system/:slug*"
