                title: UnsubscribeResponse
                payload:
                    properties:
                        channel:
                            description: Channel name that was unsubscribed
                            type: string
                    type: object
        x-fern-display-name: unsubscribe
components:
    parameters:
        feed_type:
            description: Type of feed to subscribe to
            schema:
                enum:
                    - snapshot
                    - deltas
                    - interactive
                type: string
        market_symbol:
            description: Symbol of the market (e.g., BTC-PERP)
            schema:
                type: string
        market_symbol_or_all:
            description: Market symbol or 'ALL' for all markets
            schema:
                type: string
        price_tick:
            description: Optional price tick for grouping order book prices
            schema:
                enum:
                    - "0_0000001"
                    - "0_0000005"
                    - "0_000001"
                    - "0_00001"
                    - "0_0001"
                    - "0_001"
                    - "0_01"
                    - "0_1"
                    - "1"
                    - "10"
                    - "100"
                type: string
        refresh_rate:
            description: Rate of sending updates (used in BBO channels)
            schema:
                enum:
                    - 50ms
                    - 100ms
                type: string
    schemas:
        ResponsesAccountSummaryResponse:
            additionalProperties: false
            properties:
                account:
                    description: User's starknet account
                    example: 0x495d2eb5236a12b8b4ad7d3849ce6a203ce21c43f473c248dfd5ce70d9454fa
                    type: string
                account_value:
                    description: Current account value [with unrealized P&Ls]
                    example: "136285.06918911"
                    type: string
                free_collateral:
                    description: Free collateral available (Account value in excess of Initial Margin required)
                    example: "73276.47229774"
                    type: string
                initial_margin_requirement:
                    description: Amount required to open trade for the existing positions
                    example: "63008.59689218"
                    type: string
                maintenance_margin_requirement:
                    description: Amount required to maintain exisiting positions
                    example: "31597.25239676"
                    type: string
                margin_cushion:
                    description: Acc value in excess of maintenance margin required
                    example: "104687.8167956"
                    type: string
                seq_no:
                    description: Unique increasing number (non-sequential) that is assigned to this account update. Can be used to deduplicate multiple feeds
                    example: "1681471234972000000"
                    type: integer
                settlement_asset:
                    description: Settlement asset for the account
                    example: USDC
                    type: string
                status:
                    description: Status of the acc - like ACTIVE, LIQUIDATION
                    example: ACTIVE
                    type: string
                total_collateral:
                    description: User's total collateral
                    example: "123003.62047353"
                    type: string
                updated_at:
                    description: Account last updated time
                    example: "1681471234972"
                    type: integer
            required:
                - account
                - initial_margin_requirement
                - maintenance_margin_requirement
                - account_value
                - total_collateral
                - free_collateral
                - margin_cushion
                - settlement_asset
                - updated_at
                - status
                - seq_no
            type: object
        ResponsesBBOResp:
            additionalProperties: false
            properties:
                ask:
                    description: Best ask price
                    example: "30130.15"
                    type: string
                ask_size:
                    description: Best ask size
                    example: "0.05"
                    type: string
                bid:
                    description: Best bid price
                    example: "30112.22"
                    type: string
                bid_size:
                    description: Best bid size
                    example: "0.04"
                    type: string
                last_updated_at:
                    description: Last update to the orderbook in milliseconds
                    example: "1681493939981"
                    type: integer
                market:
                    description: Symbol of the market
                    example: BTC-USD-PERP
                    type: string
                seq_no:
                    description: Sequence number of the orderbook
                    example: "20784"
                    type: integer
            required:
                - market
                - seq_no
                - ask
                - ask_size
                - bid
                - bid_size
                - last_updated_at
            type: object
        ResponsesBalanceEventResponse:
            additionalProperties: false
            properties:
                created_at:
                    description: Unix Millisecond timestamp at which the event occurred
                    example: "1681497002041"
                    type: integer
                fees:
                    description: Fees in USDC (for fill events)
                    example: "0.000000000000000000"
                    type: string
                fill_id:
                    description: Unique string ID of the fill (for fill events)
                    example: "8615262148007718462"
                    type: string
                funding_index:
                    description: Funding index used for the fill (for fill events)
                    example: "0.000000000000000000"
                    type: string
                market:
                    description: Name of the market the update is referring to (for fill events)
                    example: ETH-USD-PERP
                    type: string
                realized_funding:
                    description: Realized Funding in USDC (for fill events)
                    example: "0.000000000000000000"
                    type: string
                realized_pnl:
                    description: Realized PnL (excluding funding) in USDC (for fill events)
                    example: "0.000000000000000000"
                    type: string
                settlement_asset_address:
                    description: L2 Address of the settlement asset
                    example: "0x1234567890"
                    type: string
                settlement_asset_balance_after:
                    description: Balance of the settled asset after the update
                    example: "0.000000000000000000"
                    type: string
                settlement_asset_balance_before:
                    description: Balance of the settled asset before the update
                    example: "0.000000000000000000"
                    type: string
                settlement_asset_name:
                    description: Name of the settlement asset
                    example: USDC
                    type: string
                settlement_asset_price:
                    description: Price of the settled asset at the update
                    example: "0.000000000000000000"
                    type: string
                status:
                    description: Status of the balance event on chain
                    example: ON_BLOCKCHAIN
                    type: string
