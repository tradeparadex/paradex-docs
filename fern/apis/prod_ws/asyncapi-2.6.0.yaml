asyncapi: 2.6.0
info:
    title: WebSocket channels
    version: 1.1.0
    description: Channels for real-time updates.
servers:
    production:
        url: wss://ws.api.prod.paradex.trade/v1?
        protocol: wss
        description: Production WebSocket server
channels:
    /account:
        subscribe:
            summary: Private websocket channel for receiving updates of account status
            message:
                name: accountsummary
                title: AccountSummaryResponse
                payload:
                    $ref: '#/components/schemas/ResponsesAccountSummaryResponse'
                summary: Private websocket channel for receiving updates of account status
                description: Subscribe to account messages
        x-fern-display-name: account
    /auth:
        publish:
            summary: Authenticate the WebSocket session
            description: Validates the JWT bearer token and associates the account with the connection. Must be called before subscribing to private channels or using order management methods.
            tags:
                - name: Session
            message:
                name: authrequest
                title: AuthRequest
                payload:
                    properties:
                        bearer:
                            description: JWT string obtained from POST /auth
                            example: eyJhbGci...
                            type: string
                    required:
                        - bearer
                    type: object
        subscribe:
            summary: auth response
            tags:
                - name: Session
            message:
                name: authresponse
                title: AuthResponse
                payload:
                    properties:
                        node_id:
                            description: Opaque server node identifier
                            type: string
                    type: object
        x-fern-display-name: auth
    /balance_events:
        subscribe:
            summary: Private websocket channel to receive PnL calculation data
            message:
                name: balanceevent
                title: BalanceEventResponse
                payload:
                    $ref: '#/components/schemas/ResponsesBalanceEventResponse'
                summary: Private websocket channel to receive PnL calculation data
                description: Subscribe to balance event messages
        x-fern-display-name: balance_events
    /bbo.{market_symbol}:
        parameters:
            market_symbol:
                $ref: '#/components/parameters/market_symbol'
        subscribe:
            summary: Public websocket channel for tick updates of orderbook best bid/ask prices and amounts
            message:
                name: bboresp
                title: BBOResp
                payload:
                    $ref: '#/components/schemas/ResponsesBBOResp'
                summary: Public websocket channel for tick updates of orderbook best bid/ask prices and amounts
                description: Subscribe to market messages
        x-fern-display-name: bbo.{market_symbol}
    /fills.{market_symbol}:
        parameters:
            market_symbol:
                $ref: '#/components/parameters/market_symbol'
        subscribe:
            summary: Private websocket channel to receive details of fills for specific account
            message:
                name: fillresult
                title: FillResult
                payload:
                    $ref: '#/components/schemas/ResponsesFillResult'
                summary: Private websocket channel to receive details of fills for specific account
                description: Subscribe to fill messages for a market
        x-fern-display-name: fills.{market_symbol}
    /funding_data.{market_symbol}:
        parameters:
            market_symbol:
                $ref: '#/components/parameters/market_symbol'
        subscribe:
            summary: Public websocket channel to receive funding data updates
            message:
                name: fundingdataresult
                title: FundingDataResult
                payload:
                    $ref: '#/components/schemas/ResponsesFundingDataResult'
                summary: Public websocket channel to receive funding data updates
                description: Subscribe to funding data messages for a market
        x-fern-display-name: funding_data.{market_symbol}
    /funding_payments.{market_symbol}:
        parameters:
            market_symbol:
                $ref: '#/components/parameters/market_symbol'
        subscribe:
            summary: Private websocket channel to receive funding payments of an account
            message:
                name: fundingpayment
                title: FundingPayment
                payload:
                    $ref: '#/components/schemas/ResponsesFundingPayment'
                summary: Private websocket channel to receive funding payments of an account
                description: Subscribe to funding payment messages for a market
        x-fern-display-name: funding_payments.{market_symbol}
    /markets_summary[.{market_symbol}]:
        parameters:
            market_symbol:
                $ref: '#/components/parameters/market_symbol'
        subscribe:
            summary: Public websocket channel for updates of available markets
            message:
                name: marketsummaryresp
                title: MarketSummaryResp
                payload:
                    $ref: '#/components/schemas/ResponsesMarketSummaryResp'
                summary: Public websocket channel for updates of available markets
                description: Subscribe to market summary messages for specific markets or all markets. Supports both markets_summary (all markets) and markets_summary.{market_symbol} (specific market) subscription patterns.
        x-fern-display-name: markets_summary[.{market_symbol}]
    /order.cancel:
        publish:
            summary: Cancel a single order
            description: Cancels an order by exchange order ID or by client_id + market. Either id or (client_id + market) must be provided.
            tags:
                - name: Order Management
            message:
                name: order.cancelrequest
                title: OrderCancelRequest
                payload:
                    properties:
                        client_id:
                            description: Client-assigned order ID; requires market when used
                            example: my-order-001
                            type: string
                        id:
                            description: Order ID to cancel; either id or client_id+market is required
                            example: "1234567890"
                            type: string
                        market:
                            description: Market symbol; required when cancelling by client_id
                            example: BTC-USD-PERP
                            type: string
                    type: object
        subscribe:
            summary: order.cancel response
            tags:
                - name: Order Management
            message:
                name: order.cancelresponse
                title: OrderCancelResponse
                payload:
                    properties:
                        order_id:
                            description: Cancelled order ID
                            example: "1234567890"
                            type: string
                        status:
                            description: Cancellation status
                            enum:
                                - QUEUED_FOR_CANCELLATION
                            example: QUEUED_FOR_CANCELLATION
                            type: string
                    type: object
        x-fern-display-name: order.cancel
    /order.cancel_all:
        publish:
            summary: Cancel all open orders
            description: Cancels all open orders for the authenticated account. If market is provided only orders in that market are cancelled.
            tags:
                - name: Order Management
            message:
                name: order.cancel_allrequest
                title: OrderCancel_allRequest
                payload:
                    properties:
                        market:
                            description: If set, only cancel orders in this market; omit to cancel all open orders
                            example: BTC-USD-PERP
                            type: string
                    type: object
        subscribe:
            summary: order.cancel_all response
            tags:
                - name: Order Management
            message:
                name: order.cancel_allresponse
                title: OrderCancel_allResponse
                payload:
                    properties:
                        status:
                            description: Always "ok"
                            example: ok
                            type: string
                    type: object
        x-fern-display-name: order.cancel_all
    /order.cancel_batch:
        publish:
            summary: Cancel multiple orders by ID
            description: Cancels a list of orders by their exchange IDs. Returns a per-order status; the request does not fail if individual orders are not found or already closed.
            tags:
                - name: Order Management
            message:
                name: order.cancel_batchrequest
                title: OrderCancel_batchRequest
                payload:
                    properties:
                        order_ids:
                            description: List of order IDs to cancel
                            example: '["111","222"]'
                            items:
                                type: string
                            type: array
                    required:
                        - order_ids
                    type: object
        subscribe:
            summary: order.cancel_batch response
            tags:
                - name: Order Management
            message:
                name: order.cancel_batchresponse
                title: OrderCancel_batchResponse
                payload:
                    properties:
                        results:
                            description: Per-order outcomes in the same order as order_ids
                            items:
                                properties:
                                    id:
                                        description: Order ID
                                        example: "1234567890"
                                        type: string
                                    market:
                                        description: Market symbol (absent when status is NOT_FOUND)
                                        example: BTC-USD-PERP
                                        type: string
                                    status:
                                        description: Outcome for this order
                                        enum:
                                            - QUEUED_FOR_CANCELLATION
                                            - ALREADY_CLOSED
                                            - NOT_FOUND
                                        type: string
                                type: object
                            type: array
                    type: object
        x-fern-display-name: order.cancel_batch
    /order.cancel_on_disconnect:
        publish:
            summary: Toggle Cancel on Disconnect (CoD)
            description: When enabled, all orders placed (or already tracked) during this connection are automatically cancelled if the WebSocket disconnects unexpectedly. CoD state is scoped to the connection and does not persist across reconnects.
            tags:
                - name: Order Management
            message:
                name: order.cancel_on_disconnectrequest
                title: OrderCancel_on_disconnectRequest
                payload:
                    properties:
                        enabled:
                            description: true to enable Cancel on Disconnect, false to disable
                            type: boolean
                    required:
                        - enabled
                    type: object
        subscribe:
            summary: order.cancel_on_disconnect response
            tags:
                - name: Order Management
            message:
                name: order.cancel_on_disconnectresponse
                title: OrderCancel_on_disconnectResponse
                payload:
                    properties:
                        enabled:
                            description: The new Cancel on Disconnect state for this connection
                            type: boolean
                    type: object
        x-fern-display-name: order.cancel_on_disconnect
    /order.create:
        publish:
            summary: Submit a new order
            description: Creates a single order. Requires authentication and a valid Starknet signature over the order payload. Rate limits are shared with the REST API (same Redis counters).
            tags:
                - name: Order Management
            message:
                name: order.createrequest
                title: OrderCreateRequest
                payload:
                    properties:
                        client_id:
                            description: Client-assigned order ID (max 64 chars)
                            example: my-order-001
                            type: string
                        flags:
                            description: Order flags
                            enum:
                                - REDUCE_ONLY
                            items:
                                type: string
                            type: array
                        instruction:
                            description: Time-in-force instruction
                            enum:
                                - GTC
                                - IOC
                                - POST_ONLY
                                - RPI
                            type: string
                        market:
                            description: Market symbol
                            example: BTC-USD-PERP
                            type: string
                        on_behalf_of_account:
                            description: Isolated margin account address for isolated margin orders
                            example: "0x1234567890abcdef"
                            type: string
                        price:
                            description: Limit price; use "0" for MARKET orders
                            example: "29500.00"
                            type: string
                        recv_window:
                            description: Max milliseconds between signature_timestamp and server receipt (min 10)
                            type: integer
                        side:
                            description: Order side
                            enum:
                                - BUY
                                - SELL
                            type: string
                        signature:
                            description: Starknet signature "[r,s]" over the order payload
                            example: '[r_value,s_value]'
                            type: string
                        signature_timestamp:
                            description: Unix timestamp in milliseconds used for signature verification
                            example: "1696291200000"
                            type: integer
                        size:
                            description: Order size (decimal string)
                            example: "0.01"
                            type: string
                        stp:
                            description: Self-trade prevention
                            enum:
                                - EXPIRE_MAKER
                                - EXPIRE_TAKER
                                - EXPIRE_BOTH
                            type: string
                        trigger_price:
                            description: Trigger price for stop orders
                            example: "29000.00"
                            type: string
                        type:
                            description: Order type
                            enum:
                                - LIMIT
                                - MARKET
                                - STOP_LIMIT
                                - STOP_MARKET
                            type: string
                    required:
                        - market
                        - side
                        - type
                        - size
                        - price
                        - instruction
                        - signature
                        - signature_timestamp
                    type: object
        subscribe:
            summary: order.create response
            tags:
                - name: Order Management
            message:
                name: order.createresponse
                title: OrderCreateResponse
                payload:
                    properties:
                        created_at:
                            description: Matching-engine timestamp in milliseconds
                            example: "1696291200000"
                            type: integer
                        order:
                            description: Created order
                            properties:
                                account:
                                    description: Account address that owns the order
                                    example: 0x4638e30...
                                    type: string
                                avg_fill_price:
                                    description: Volume-weighted average fill price; "0" if unfilled
                                    example: "0"
                                    type: string
                                cancel_reason:
                                    description: Reason for cancellation (populated when status=CLOSED)
                                    example: USER_CANCELED
                                    type: string
                                client_id:
                                    description: Client-assigned order ID
                                    example: my-order-001
                                    type: string
                                created_at:
                                    description: Order creation time in milliseconds
                                    example: "1696291200000"
                                    type: integer
                                flags:
                                    description: Order flags applied
                                    example: '["REDUCE_ONLY"]'
                                    items:
                                        type: string
                                    type: array
                                id:
                                    description: Unique order identifier assigned by exchange
                                    example: "1234567890"
                                    type: string
                                instruction:
                                    description: Time-in-force instruction
                                    enum:
                                        - GTC
                                        - IOC
                                        - POST_ONLY
                                        - RPI
                                    type: string
                                last_updated_at:
                                    description: Order last update time in milliseconds
                                    example: "1696291200000"
                                    type: integer
                                market:
                                    description: Market symbol
                                    example: BTC-USD-PERP
                                    type: string
                                price:
                                    description: Limit price
                                    example: "29500.00"
                                    type: string
                                published_at:
                                    description: Exchange publish time in milliseconds
                                    example: "1696291200000"
                                    type: integer
                                received_at:
                                    description: Exchange receipt time in milliseconds
                                    example: "1696291200000"
                                    type: integer
                                remaining_size:
                                    description: Remaining unfilled size
                                    example: "0.01"
                                    type: string
                                seq_no:
                                    description: Monotonically increasing sequence number for this order's updates
                                    example: "20784"
                                    type: integer
                                side:
                                    description: Order side
                                    enum:
                                        - BUY
                                        - SELL
                                    type: string
                                size:
                                    description: Order size
                                    example: "0.01"
                                    type: string
                                status:
                                    description: Order status
                                    enum:
                                        - NEW
                                        - OPEN
                                        - CLOSED
                                    type: string
                                timestamp:
                                    description: Signature timestamp supplied at creation
                                    example: "1696291200000"
                                    type: integer
                                trigger_price:
                                    description: Trigger price for stop orders
                                    example: "29000.00"
                                    type: string
                                type:
                                    description: Order type
                                    enum:
                                        - LIMIT
                                        - MARKET
                                        - STOP_LIMIT
                                        - STOP_MARKET
                                    type: string
                            type: object
                        received_at:
                            description: Server receipt timestamp in nanoseconds, recorded before any speedbump
                            example: "1696291200123456789"
                            type: integer
                    type: object
        x-fern-display-name: order.create
    /order.create_batch:
        publish:
            summary: Submit multiple orders in a single request
            description: Creates up to the configured maximum number of orders atomically. All signatures are validated before any orders reach the matching engine. Rate limit is consumed once for the entire batch.
            tags:
                - name: Order Management
            message:
                name: order.create_batchrequest
                title: OrderCreate_batchRequest
                payload:
                    properties:
                        orders:
                            description: Array of order create requests (max batch size enforced server-side)
                            items:
                                properties:
                                    client_id:
                                        description: Client-assigned order ID (max 64 chars)
                                        example: my-order-001
                                        type: string
                                    flags:
                                        description: Order flags
                                        enum:
                                            - REDUCE_ONLY
                                        items:
                                            type: string
                                        type: array
                                    instruction:
                                        description: Time-in-force instruction
                                        enum:
                                            - GTC
                                            - IOC
                                            - POST_ONLY
                                            - RPI
                                        type: string
                                    market:
                                        description: Market symbol
                                        example: BTC-USD-PERP
                                        type: string
                                    on_behalf_of_account:
                                        description: Isolated margin account address for isolated margin orders
                                        example: "0x1234567890abcdef"
                                        type: string
                                    price:
                                        description: Limit price; use "0" for MARKET orders
                                        example: "29500.00"
                                        type: string
                                    recv_window:
                                        description: Max milliseconds between signature_timestamp and server receipt (min 10)
                                        type: integer
                                    side:
                                        description: Order side
                                        enum:
                                            - BUY
                                            - SELL
                                        type: string
                                    signature:
                                        description: Starknet signature "[r,s]" over the order payload
                                        example: '[r_value,s_value]'
                                        type: string
                                    signature_timestamp:
                                        description: Unix timestamp in milliseconds used for signature verification
                                        example: "1696291200000"
                                        type: integer
                                    size:
                                        description: Order size (decimal string)
                                        example: "0.01"
                                        type: string
                                    stp:
                                        description: Self-trade prevention
                                        enum:
                                            - EXPIRE_MAKER
                                            - EXPIRE_TAKER
                                            - EXPIRE_BOTH
                                        type: string
                                    trigger_price:
                                        description: Trigger price for stop orders
                                        example: "29000.00"
                                        type: string
                                    type:
                                        description: Order type
                                        enum:
                                            - LIMIT
                                            - MARKET
                                            - STOP_LIMIT
                                            - STOP_MARKET
                                        type: string
                                required:
                                    - market
                                    - side
                                    - type
                                    - size
                                    - price
                                    - instruction
                                    - signature
                                    - signature_timestamp
                                type: object
                            type: array
                    required:
                        - orders
                    type: object
        subscribe:
            summary: order.create_batch response
            tags:
                - name: Order Management
            message:
                name: order.create_batchresponse
                title: OrderCreate_batchResponse
                payload:
                    properties:
                        results:
                            description: Per-order outcomes in the same order as the request array
                            items:
                                properties:
                                    created_at:
                                        description: Matching-engine timestamp in milliseconds (present on success)
                                        type: integer
                                    error:
                                        description: Error message (present on failure)
                                        type: string
                                    order:
                                        description: Created order (present on success)
                                        properties:
                                            account:
                                                description: Account address that owns the order
                                                example: 0x4638e30...
                                                type: string
                                            avg_fill_price:
                                                description: Volume-weighted average fill price; "0" if unfilled
                                                example: "0"
                                                type: string
                                            cancel_reason:
                                                description: Reason for cancellation (populated when status=CLOSED)
                                                example: USER_CANCELED
                                                type: string
                                            client_id:
                                                description: Client-assigned order ID
                                                example: my-order-001
                                                type: string
                                            created_at:
                                                description: Order creation time in milliseconds
                                                example: "1696291200000"
                                                type: integer
                                            flags:
                                                description: Order flags applied
                                                example: '["REDUCE_ONLY"]'
                                                items:
                                                    type: string
                                                type: array
                                            id:
                                                description: Unique order identifier assigned by exchange
                                                example: "1234567890"
                                                type: string
                                            instruction:
                                                description: Time-in-force instruction
                                                enum:
                                                    - GTC
                                                    - IOC
                                                    - POST_ONLY
                                                    - RPI
                                                type: string
                                            last_updated_at:
                                                description: Order last update time in milliseconds
                                                example: "1696291200000"
                                                type: integer
                                            market:
                                                description: Market symbol
                                                example: BTC-USD-PERP
                                                type: string
                                            price:
                                                description: Limit price
                                                example: "29500.00"
                                                type: string
                                            published_at:
                                                description: Exchange publish time in milliseconds
                                                example: "1696291200000"
                                                type: integer
                                            received_at:
                                                description: Exchange receipt time in milliseconds
                                                example: "1696291200000"
                                                type: integer
                                            remaining_size:
                                                description: Remaining unfilled size
                                                example: "0.01"
                                                type: string
                                            seq_no:
                                                description: Monotonically increasing sequence number for this order's updates
                                                example: "20784"
                                                type: integer
                                            side:
                                                description: Order side
                                                enum:
                                                    - BUY
                                                    - SELL
                                                type: string
                                            size:
                                                description: Order size
                                                example: "0.01"
                                                type: string
                                            status:
                                                description: Order status
                                                enum:
                                                    - NEW
                                                    - OPEN
                                                    - CLOSED
                                                type: string
                                            timestamp:
                                                description: Signature timestamp supplied at creation
                                                example: "1696291200000"
                                                type: integer
                                            trigger_price:
                                                description: Trigger price for stop orders
                                                example: "29000.00"
                                                type: string
                                            type:
                                                description: Order type
                                                enum:
                                                    - LIMIT
                                                    - MARKET
                                                    - STOP_LIMIT
                                                    - STOP_MARKET
                                                type: string
                                        type: object
                                    received_at:
                                        description: Server receipt timestamp in nanoseconds (present on success)
                                        type: integer
                                type: object
                            type: array
                    type: object
        x-fern-display-name: order.create_batch
    /order.modify:
        publish:
            summary: Modify an existing open order
            description: Updates the price and/or size of an open order. A new Starknet signature over the updated order payload is required.
            tags:
                - name: Order Management
            message:
                name: order.modifyrequest
                title: OrderModifyRequest
                payload:
                    properties:
                        id:
                            description: Order ID to modify
                            example: "1234567890"
                            type: string
                        market:
                            description: Market symbol of the existing order
                            example: BTC-USD-PERP
                            type: string
                        on_behalf_of_account:
                            description: Isolated margin account address
                            example: "0x1234567890abcdef"
                            type: string
                        price:
                            description: New (or unchanged) limit price
                            example: "29600.00"
                            type: string
                        side:
                            description: Existing side of the order
                            enum:
                                - BUY
                                - SELL
                            type: string
                        signature:
                            description: Starknet signature "[r,s]" over the modified order payload
                            example: '[r_value,s_value]'
                            type: string
                        signature_timestamp:
                            description: Unix timestamp in milliseconds used for signature verification
                            example: "1696291300000"
                            type: integer
                        size:
                            description: New (or unchanged) size
                            example: "0.02"
                            type: string
                        trigger_price:
                            description: New (or unchanged) trigger price for TPSL orders
                            example: "29000.00"
                            type: string
                        type:
                            description: Existing type of the order
                            enum:
                                - LIMIT
                                - MARKET
                                - STOP_LIMIT
                                - STOP_MARKET
                            type: string
                    required:
                        - id
                        - market
                        - side
                        - type
                        - size
                        - price
                        - signature
                        - signature_timestamp
                    type: object
        subscribe:
            summary: order.modify response
            tags:
                - name: Order Management
            message:
                name: order.modifyresponse
                title: OrderModifyResponse
                payload:
                    properties:
                        order:
                            description: Modified order
                            properties:
                                account:
                                    description: Account address that owns the order
                                    example: 0x4638e30...
                                    type: string
                                avg_fill_price:
                                    description: Volume-weighted average fill price; "0" if unfilled
                                    example: "0"
                                    type: string
                                cancel_reason:
                                    description: Reason for cancellation (populated when status=CLOSED)
                                    example: USER_CANCELED
                                    type: string
                                client_id:
                                    description: Client-assigned order ID
                                    example: my-order-001
                                    type: string
                                created_at:
                                    description: Order creation time in milliseconds
                                    example: "1696291200000"
                                    type: integer
                                flags:
                                    description: Order flags applied
                                    example: '["REDUCE_ONLY"]'
                                    items:
                                        type: string
                                    type: array
                                id:
                                    description: Unique order identifier assigned by exchange
                                    example: "1234567890"
                                    type: string
                                instruction:
                                    description: Time-in-force instruction
                                    enum:
                                        - GTC
                                        - IOC
                                        - POST_ONLY
                                        - RPI
                                    type: string
                                last_updated_at:
                                    description: Order last update time in milliseconds
                                    example: "1696291200000"
                                    type: integer
                                market:
                                    description: Market symbol
                                    example: BTC-USD-PERP
                                    type: string
                                price:
                                    description: Limit price
                                    example: "29500.00"
                                    type: string
                                published_at:
                                    description: Exchange publish time in milliseconds
                                    example: "1696291200000"
                                    type: integer
                                received_at:
                                    description: Exchange receipt time in milliseconds
                                    example: "1696291200000"
                                    type: integer
                                remaining_size:
                                    description: Remaining unfilled size
                                    example: "0.01"
                                    type: string
                                seq_no:
                                    description: Monotonically increasing sequence number for this order's updates
                                    example: "20784"
                                    type: integer
                                side:
                                    description: Order side
                                    enum:
                                        - BUY
                                        - SELL
                                    type: string
                                size:
                                    description: Order size
                                    example: "0.01"
                                    type: string
                                status:
                                    description: Order status
                                    enum:
                                        - NEW
                                        - OPEN
                                        - CLOSED
                                    type: string
                                timestamp:
                                    description: Signature timestamp supplied at creation
                                    example: "1696291200000"
                                    type: integer
