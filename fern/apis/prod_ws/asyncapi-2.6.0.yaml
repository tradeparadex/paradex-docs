                - market
                - status
                - settlement_asset_name
                - settlement_asset_address
                - settlement_asset_balance_before
                - settlement_asset_balance_after
                - settlement_asset_price
                - funding_index
                - realized_pnl
                - fees
                - realized_funding
                - created_at
